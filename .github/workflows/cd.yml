# CD Pipeline — Auto-deploy to AWS ECS Fargate
#
# Triggers on push to main after CI passes.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID     — IAM user access key
#   AWS_SECRET_ACCESS_KEY — IAM user secret key
#   AWS_REGION            — e.g. us-east-1

name: CD

on:
  push:
    branches: [main]

# Only one deployment at a time
concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  ECS_CLUSTER: paper2notebook-cluster
  BACKEND_SERVICE: paper2notebook-backend
  FRONTEND_SERVICE: paper2notebook-frontend
  BACKEND_ECR_REPO: paper2notebook-backend
  FRONTEND_ECR_REPO: paper2notebook-frontend

jobs:
  deploy:
    name: Build & Deploy to AWS ECS
    runs-on: ubuntu-latest
    # Only deploy after CI passes
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # --- Build & push backend ---
      - name: Build backend Docker image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push backend image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }}

      # --- Build & push frontend ---
      - name: Build frontend Docker image
        run: |
          docker build \
            -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=http://$(aws elbv2 describe-load-balancers --names paper2notebook-alb --query 'LoadBalancers[0].DNSName' --output text 2>/dev/null || echo "localhost:8000") \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.FRONTEND_ECR_REPO }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push frontend image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.FRONTEND_ECR_REPO }}:${{ env.IMAGE_TAG }}

      # --- Update ECS services ---
      - name: Update backend ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.BACKEND_SERVICE }} \
            --force-new-deployment \
            --no-cli-pager

      - name: Update frontend ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.FRONTEND_SERVICE }} \
            --force-new-deployment \
            --no-cli-pager

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend image:** ${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend image:** ${{ env.FRONTEND_ECR_REPO }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
